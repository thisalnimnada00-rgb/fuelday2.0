<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelMate SL | Eligibility Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>FuelMate<span>.</span></h1>
            <p>Check your refuelling eligibility based on your number plate and weekly limits.</p>
        </div>

        <form id="fuelForm">
            <div class="input-group">
                <label for="plateNumber">Vehicle Number Plate</label>
                <input type="text" id="plateNumber" placeholder="e.g., WP CAA-1234 or 1234" required>
            </div>

            <div class="input-group">
                <label>Have you reached this week's fuel limit?</label>
                <p class="sub-label">(15L for Cars/Vans | 5L for Bikes/3-Wheelers. Limit resets every Saturday)</p>
                <div class="radio-group">
                    <label class="radio-btn">
                        <input type="radio" name="limit" id="limitYes" value="yes" required>
                        <span>Yes</span>
                    </label>
                    <label class="radio-btn">
                        <input type="radio" name="limit" id="limitNo" value="no" checked>
                        <span>No</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn">Check Eligibility</button>
        </form>

        <div id="result" class="result-card hidden">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
